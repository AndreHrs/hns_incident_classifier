[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "D"]
ignore = ["E501"]
exclude = [
    "main_notebook.py",
    "main_notebook.ipynb",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D"]
"main_notebook.py" = ["E402"]
